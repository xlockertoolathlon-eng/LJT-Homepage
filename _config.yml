# Welcome to Jekyll!\n#\n# This config file is meant for settings that affect your entire site, values\n# which you are expected to set up once and rarely need to edit after that.\n# For technical reasons, this file is *NOT* reloaded automatically when you use\n# `jekyll serve -l -H localhost`. If you change this file, please restart the \n# server process.\n\n# Basic Site Settings\nlocale                   : \"en-US\"\nsite_theme               : \"default\" # The available themes options are \"default\", \"air\", \"sunrise\", \"mint\", \"dirt\" and \"contrast\"\ntitle                    : \"Junteng Liu\"\ntitle_separator          : \"-\"\nname                     : &name \"Junteng Liu\"\ndescription              : &description \"Junteng Liu's academic portfolio\"   # Update this with a general description of your site, this is the default if not overridden by a page\nurl                      : https://xlockertoolathlon-eng.github.io # The base hostname & protocol for your site e.g. \"https://[your GitHub username].github.io\",\n                                                           # or if you already have some other page hosted on Github then use \"https://[your GitHub username].github.io/[Your Repo Name]\"\nbaseurl                  : \"/LJT-Homepage\" # the subpath of your site, e.g. \"/blog\"\nrepository               : \"xlockertoolathlon-eng/LJT-Homepage\"\n\n# Site Author - The following control what appear as part of the author content on the side bar.\n#               If a field is blank the icon and link will not appear, otherwise it will be shown.\n#               Additional customization can be done by editing /_includes/author-profile.html\nauthor:\n  # Biographic information\n  avatar           : \"profile.png\"\n  name             : \"Junteng Liu\"\n  pronouns         : # example: \"she/her\"  \n  bio              : \"First-year PhD candidate at HKUST NLP Group. Graduated from Shanghai Jiao Tong University (SJTU) in June 2024. Research focuses on natural language processing and machine learning. Research interests include LLM Reasoning and Reinforcement Learning, Hallucination in Vision-Language Models (VLM), LLM truthfulness and Interpretability.\"\n  location         : \"Hong Kong\"\n  employer         : \"HKUST NLP Group\"\n  uri              : \"https://xlockertoolathlon-eng.github.io/LJT-Homepage\"\n  email            : \"jliugi@connect.ust.hk\" \n\n  # Academic websites\n  academia         : # URL\n  arxiv            : # URL - Update with the correct link to your profile\n  googlescholar    : \"https://scholar.google.com/citations?hl=en&user=tbK9jl4AAAAJ&view_op=list_works&sortby=pubdate\"\n  inspire-hep      : # URL\n  impactstory      : # URL\n  orcid            : # URL\n  semantic         : # URL\n  ssrn             : # URL\n  pubmed           : # URL\n  researchgate     : # URL\n  scopus           : # URL\n  zotero           : # URL\n\n\n  # Repositories and software development\n  bitbucket        : # Username - Update with your username on the site\n  codepen          : # Username\n  dribbble         : # Username\n  github           : \"Vicent0205\"\n  kaggle           : # Username  \n  stackoverflow    : # User number or user number and name (i.e., use \"1\" or \"1/jeff-atwood\")    \n\n  # Social media\n  artstation       : # Username\n  bluesky          : # Replace this with you Bluesky username\n  facebook         : # Username\n  flickr           : # Username\n  foursquare       : # Username\n  goodreads        : # Username\n  google_plus      : # Username\n  keybase          : # Username\n  instagram        : # Username\n  lastfm           : # Username\n  linkedin         : # Username\n  mastodon         : # URL\n  medium           : # URL\n  pinterest        : # Username\n  soundcloud       : # Username\n  steam            : # Username\n  telegram         : # URL\n  tumblr           : # Username\n  twitter          : \"junteng88716710\" # Username for X / Twitter\n  vine             : # Username\n  weibo            : # Username\n  wikipedia        : # Username\n  xing             : # Username\n  youtube          : # Username\n  zhihu            : # Username\n\n# Publication Category - The following the list of publication categories and their headings\npublication_category:\n  books:\n    title: 'Books'\n  manuscripts:\n    title: 'Journal Articles'    \n  conferences:\n    title: 'Conference Papers'\n\n# Site Settings\nteaser                   :  # filename of teaser fallback teaser image placed in /images/ for social media previews\nbreadcrumbs              : false # true, false (default)\nwords_per_minute         : 160\nfuture                   : true\nread_more                : \"disabled\" # if enabled, adds \"Read more\" links to excerpts\ntalkmap_link             : false      #change to true to add link to talkmap on talks page\ncomments:\n  provider               : # false (default), \"disqus\", \"discourse\", \"facebook\", \"google-plus\", \"staticman\", \"custom\"\n  disqus:\n    shortname            :\n  discourse:\n    server               : # https://meta.discourse.org/t/embedding-discourse-comments-via-javascript/31963 , e.g.: meta.discourse.org\n  facebook:\n    appid                :\n    num_posts            : # 5 (default)\n    colorscheme          : # \"light\" (default), \"dark\"\nstaticman:\n  allowedFields          : ['name', 'email', 'url', 'message']\n  branch                 : \"gh-pages\" # \"master\", \"gh-pages\"\n  commitMessage          : \"New comment.\"\n  filename               : comment-{@timestamp}\n  format                 : \"yml\"\n  moderation             : true\n  path                   : \"_data/comments/{options.slug}\"\n  requiredFields         : ['name', 'email', 'message']\n  transforms:\n    email                : \"md5\"\n  generatedFields:\n    date:\n      type               : \"date\"\n      options:\n        format           : \"iso8601\" # \"iso8601\" (default), \"timestamp-seconds\", \"timestamp-milliseconds\"\natom_feed:\n  hide                   : false     # change to true to hide the RSS feed in the footer\n  path                   : # blank (default) uses feed.xml\n\n\n# SEO Related\ngoogle_site_verification :\nbing_site_verification   :\nalexa_site_verification  :\nyandex_site_verification :\n\n\n# Social Sharing\ntwitter:\n  username               : &twitter \"junteng88716710\"\nfacebook:\n  username               :\n  app_id                 :\n  publisher              :\nog_image                 :  # Social media default site image\nog_description           :  # Social media default site image description\n# For specifying social profiles\n# - https://developers.google.com/structured-data/customize/social-profiles\nsocial:\n  type                   : # Person or Organization (defaults to Person)\n  name                   : # If the user or organization name differs from the site's name\n  links: # An array of links to social media profiles\n\n\n# Analytics\nanalytics:\n  provider               :  \"false\" # false (default), \"google\", \"google-universal\", \"google-analytics-4\", \"custom\"\n  google:\n    tracking_id          :\n\n\n# Reading Files\ninclude:\n  - .htaccess\n  - _pages\n  - files\nexclude:\n  - \"*.sublime-project\"\n  - \"*.sublime-workspace\"\n  - .asset-cache\n  - .bundle\n  - .github\n  - .jekyll-assets-cache\n  - .sass-cache\n  - assets/js/_main.js\n  - assets/js/plugins\n  - assets/js/vendor\n  - CHANGELOG\n  - Capfile\n  - config\n  - Dockerfile\n  - Gemfile\n  - Gruntfile.js\n  - gulpfile.js\n  - LICENSE\n  - local\n  - log\n  - node_modules\n  - package.json*\n  - Rakefile\n  - README\n  - tmp\n  - vendor\nkeep_files:\n  - .git\n  - .svn\nencoding: \"utf-8\"\nmarkdown_ext: \"markdown,mkdown,mkdn,mkd,md\"\n\n\n# Conversion\nmarkdown: kramdown\nhighlighter: rouge\nlsi: false\nexcerpt_separator: \"\\n\\n\"\nincremental: false\n\n\n# Markdown Processing\nkramdown:\n  input: GFM\n  hard_wrap: false\n  auto_ids: true\n  footnote_nr: 1\n  entity_output: as_char\n  toc_levels: 1..6\n  smart_quotes: lsquo,rsquo,ldquo,rdquo\n  enable_coderay: false\n\n\n# These settings control the types of collections used by the template\ncollections:\n  teaching:\n    output: true\n    permalink: /:collection/:path/\n  publications:\n    output: true\n    permalink: /:collection/:path/\n  portfolio:\n    output: true\n    permalink: /:collection/:path/\n  talks:\n    output: true\n    permalink: /:collection/:path/\n\n\n# These settings control how pages and collections are included in the site\ndefaults:\n  # _posts\n  - scope:\n      path: \"\"\n      type: posts\n    values:\n      layout: single\n      author_profile: true\n      read_time: true\n      comments: true\n      share: true\n      related: true\n  # _pages\n  - scope:\n      path: \"\"\n      type: pages\n    values:\n      layout: single\n      author_profile: true\n  # _teaching\n  - scope:\n      path: \"\"\n      type: teaching\n    values:\n      layout: single\n      author_profile: true\n      share: true\n      comments: true\n  # _publications\n  - scope:\n      path: \"\"\n      type: publications\n    values:\n      layout: single\n      author_profile: true\n      share: true\n      comments: true\n  # _portfolio\n  - scope:\n      path: \"\"\n      type: portfolio\n    values:\n      layout: single\n      author_profile: true\n      share: true\n      comment: true\n  # _talks\n  - scope:\n      path: \"\"\n      type: talks\n    values:\n      layout: talk\n      author_profile: true\n      share: true\n\n\n# Sass/SCSS\nsass:\n  sass_dir: _sass\n  style: compressed # https://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style\n\n\n# Outputting\npermalink: /:categories/:title/\n# paginate: 5 # amount of posts to show\n# paginate_path: /page:num/\ntimezone: Etc/UTC # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones\n\n\n# Plugins\nplugins:\n  - jekyll-feed\n  - jekyll-gist\n  - jekyll-paginate\n  - jekyll-sitemap\n  - jekyll-redirect-from\n  - jemoji\n\n# Mimic GitHub Pages with --safe\nwhitelist:\n  - jekyll-feed\n  - jekyll-gist\n  - jekyll-paginate\n  - jekyll-sitemap\n  - jekyll-redirect-from\n  - jemoji\n\n\n# Archives\n#  Type\n#  - GitHub Pages compatible archive pages built with Liquid ~> type: liquid (default)\n#  - Jekyll Archives plugin archive pages ~> type: jekyll-archives\n#  Path (examples)\n#  - Archive page should exist at path when using Liquid method or you can\n#    expect broken links (especially with breadcrumbs enabled)\n#  - <base_path>/tags/my-awesome-tag/index.html ~> path: /tags/\n#  - <base_path/categories/my-awesome-category/index.html ~> path: /categories/\n#  - <base_path/my-awesome-category/index.html ~> path: /\ncategory_archive:\n  type: liquid\n  path: /categories/\ntag_archive:\n  type: liquid\n  path: /tags/\n# https://github.com/jekyll/jekyll-archives\n# jekyll-archives:\n#   enabled:\n#     - categories\n#     - tags\n#   layouts:\n#     category: archive-taxonomy\n#     tag: archive-taxonomy\n#   permalinks:\n#     category: /categories/:name/\n#     tag: /tags/:name/\n\n\n# HTML Compression\n# - https://jch.penibelst.de/\ncompress_html:\n  clippings: all\n  ignore:\n    envs: development\n